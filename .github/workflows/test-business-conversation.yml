name: CI - Business Conversation Validation

on:
  push:
    branches: [main, develop]
    paths:
      - 'backend/**'
      - '.claude/BUSINESS_CONVERSATION.md'
      - '.github/workflows/test-business-conversation.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'backend/**'
      - '.claude/BUSINESS_CONVERSATION.md'

jobs:
  test:
    runs-on: ubuntu-latest
    name: Validate Business Conversation Compliance

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Check that .claude/BUSINESS_CONVERSATION.md exists
        run: |
          if [ ! -f ".claude/BUSINESS_CONVERSATION.md" ]; then
            echo "ERROR: .claude/BUSINESS_CONVERSATION.md not found!"
            exit 1
          fi

      - name: Run Business Conversation tests
        working-directory: backend
        run: python -m pytest test_business_conversation.py -v --tb=short

      - name: Run full test suite
        working-directory: backend
        run: python -m pytest -v --tb=short

      - name: Generate coverage report
        working-directory: backend
        run: python -m pytest test_business_conversation.py --cov=analyst --cov-report=xml
        continue-on-error: true

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./backend/coverage.xml
          flags: unittests
          fail_ci_if_error: false

  lint:
    runs-on: ubuntu-latest
    name: Lint Backend Code

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install linting tools
        run: |
          pip install pylint flake8

      - name: Lint analyst.py for compliance
        working-directory: backend
        run: |
          # Check for banned words in analyst.py
          if grep -E "(entity|workflow|schema|database|API|backend|frontend)" analyst.py | grep -E "(#|\"\"\")" > /dev/null; then
            echo "WARNING: Found potential technical jargon in comments. Review manually."
          fi
          flake8 analyst.py --max-line-length=100 || true
        continue-on-error: true
